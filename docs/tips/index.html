rk\",\"act\":2,\"difficulty\":\"intermediate\",\"category\":\"workflow\",\"tags\":[\"testing\",\"verification\",\"workflow\"],\"timestamp\":\"22:11\"},{\"id\":31,\"title\":\"Consider Opus for complex work\",\"description\":\"Use Opus for complex architectural decisions\",\"act\":2,\"difficulty\":\"intermediate\",\"category\":\"workflow\",\"tags\":[\"models\",\"optimization\",\"performance\"],\"timestamp\":\"23:04\"},{\"id\":32,\"title\":\"Read thinking blocks\",\"description\":\"Read Claude's thinking blocks for better understanding\",\"act\":2,\"difficulty\":\"intermediate\",\"category\":\"workflow\",\"tags\":[\"models\",\"thinking\",\"transparency\"],\"timestamp\":\"24:10\"},{\"id\":33,\"title\":\"Four composability primitives\",\"description\":\"Claude Code has four composability primitives\",\"act\":3,\"difficulty\":\"advanced\",\"category\":\"power-user\",\"tags\":[\"skills\",\"commands\",\"mcp\",\"subagents\"],\"timestamp\":\"25:15\"},{\"id\":34,\"title\":\"Skills = recurring workflows\",\"description\":\"Skills encapsulate reusable workflows\",\"act\":3,\"difficulty\":\"advanced\",\"category\":\"power-user\",\"tags\":[\"skills\",\"workflows\",\"automation\"],\"timestamp\":\"25:42\"},{\"id\":35,\"title\":\"Commands = quick shorthand\",\"description\":\"Commands are quick aliases for common actions\",\"act\":3,\"difficulty\":\"beginner\",\"category\":\"power-user\",\"tags\":[\"commands\",\"shortcuts\",\"productivity\"],\"timestamp\":\"26:50\"},{\"id\":36,\"title\":\"Never create commands manually\",\"description\":\"Let Claude create commands for you\",\"act\":3,\"difficulty\":\"beginner\",\"category\":\"power-user\",\"tags\":[\"commands\",\"automation\",\"skills\"],\"timestamp\":\"27:32\"},{\"id\":37,\"title\":\"MCPs = external service docs\",\"description\":\"MCPs connect Claude Code to external services\",\"act\":3,\"difficulty\":\"advanced\",\"category\":\"power-user\",\"tags\":[\"mcp\",\"integrations\",\"apis\"],\"timestamp\":\"28:05\"},{\"id\":38,\"title\":\"Ask Claude to install MCPs\",\"description\":\"Let Claude handle MCP installation and configuration\",\"act\":3,\"difficulty\":\"intermediate\",\"category\":\"power-user\",\"tags\":[\"mcp\",\"installation\",\"automation\"],\"timestamp\":\"28:52\"},{\"id\":39,\"title\":\"Subagents = isolated context\",\"description\":\"Subagents work in isolated contexts\",\"act\":3,\"difficulty\":\"advanced\",\"category\":\"power-user\",\"tags\":[\"subagents\",\"context\",\"parallel\"],\"timestamp\":\"29:54\"},{\"id\":40,\"title\":\"Avoid instruction overload\",\"description\":\"Keep CLAUDE.md concise to avoid instruction overload\",\"act\":3,\"difficulty\":\"intermediate\",\"category\":\"power-user\",\"tags\":[\"claudemd\",\"config\",\"simplicity\"],\"timestamp\":\"31:15\"},{\"id\":41,\"title\":\"Run multiple instances\",\"description\":\"Run multiple Claude Code instances simultaneously\",\"act\":4,\"difficulty\":\"advanced\",\"category\":\"advanced\",\"tags\":[\"instances\",\"productivity\",\"workflow\"],\"timestamp\":\"32:08\"},{\"id\":42,\"title\":\"iTerm split panes\",\"description\":\"Use iTerm split panes for better multi-instance management\",\"act\":4,\"difficulty\":\"intermediate\",\"category\":\"advanced\",\"tags\":[\"iterm\",\"productivity\",\"setup\"],\"timestamp\":\"33:12\"},{\"id\":43,\"title\":\"Enable notifications\",\"description\":\"Enable notifications for long-running tasks\",\"act\":4,\"difficulty\":\"beginner\",\"category\":\"advanced\",\"tags\":[\"notifications\",\"productivity\",\"settings\"],\"timestamp\":\"34:10\"},{\"id\":44,\"title\":\"Git worktrees for isolation\",\"description\":\"Use git worktrees for isolated development\",\"act\":4,\"difficulty\":\"advanced\",\"category\":\"advanced\",\"tags\":[\"git\",\"worktrees\",\"isolation\"],\"timestamp\":\"35:05\"},{\"id\":45,\"title\":\"/chrome connects browser\",\"description\":\"Use /chrome to connect Chrome browser for debugging\",\"act\":4,\"difficulty\":\"intermediate\",\"category\":\"advanced\",\"tags\":[\"chrome\",\"browser\",\"debugging\"],\"timestamp\":\"36:15\"},{\"id\":46,\"title\":\"Powerful for debugging\",\"description\":\"Claude Code is exceptionally powerful for debugging\",\"act\":4,\"difficulty\":\"intermediate\",\"category\":\"advanced\",\"tags\":[\"debugging\",\"workflow\",\"systematic\"],\"timestamp\":\"37:20\"},{\"id\":47,\"title\":\"Hooks intercept actions\",\"description\":\"Hooks intercept and modify Claude Code actions\",\"act\":4,\"difficulty\":\"advanced\",\"category\":\"advanced\",\"tags\":[\"hooks\",\"automation\",\"events\"],\"timestamp\":\"38:22\"},{\"id\":48,\"title\":\"Auto-format with PostToolUse\",\"description\":\"Use PostToolUse hooks for automatic code formatting\",\"act\":4,\"difficulty\":\"intermediate\",\"category\":\"advanced\",\"tags\":[\"hooks\",\"formatting\",\"automation\"],\"timestamp\":\"39:05\"},{\"id\":49,\"title\":\"Block dangerous commands\",\"description\":\"Use hooks to block dangerous commands\",\"act\":4,\"difficulty\":\"advanced\",\"category\":\"advanced\",\"tags\":[\"hooks\",\"security\",\"safety\"],\"timestamp\":\"40:10\"},{\"id\":50,\"title\":\"Explore the plugin ecosystem\",\"description\":\"Explore the growing plugin ecosystem\",\"act\":4,\"difficulty\":\"intermediate\",\"category\":\"advanced\",\"tags\":[\"plugins\",\"ecosystem\",\"extensions\"],\"timestamp\":\"41:20\"},{\"id\":51,\"title\":\"Use Insights\",\"description\":\"Leverage Claude's ability to analyze and extract insights from your codebase\",\"act\":4,\"difficulty\":\"intermediate\",\"category\":\"advanced\",\"tags\":[\"insights\",\"analysis\",\"pattern-recognition\"],\"timestamp\":\"42:00\"}]";

  const allTips = JSON.parse(tipsData);
  let currentFilters = {
    act: '',
    difficulty: '',
    category: ''
  };

  const tipsGrid = document.getElementById('tips-grid');
  const tipCount = document.getElementById('tip-count');
  const emptyState = document.getElementById('empty-state');
  const clearBtn = document.getElementById('clear-filters');

  function renderTips(tips) {
    if (tips.length === 0) {
      tipsGrid.classList.add('hidden');
      emptyState.classList.remove('hidden');
      tipCount.textContent = '0';
      return;
    }

    tipsGrid.classList.remove('hidden');
    emptyState.classList.add('hidden');
    tipCount.textContent = tips.length;

    tipsGrid.innerHTML = tips.map(tip => `
      <a href="/tips/${tip.id}" class="card tip-card">
        <div class="tip-header">
          <span class="tip-id">#${tip.id}</span>
          <div class="badges">
            <span class="badge badge-${tip.difficulty}">${tip.difficulty}</span>
            <span class="tag">Act ${tip.act}</span>
          </div>
        </div>
        <h2>${tip.title}</h2>
        <p>${tip.description}</p>
        <div class="tip-footer">
          <span class="timestamp">${tip.timestamp}</span>
          <div class="tags">
            ${tip.tags.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
        </div>
      </a>
    `).join('');
  }

  function filterTips() {
    let filtered = allTips;

    if (currentFilters.act) {
      filtered = filtered.filter(tip => tip.act === parseInt(currentFilters.act));
    }
    if (currentFilters.difficulty) {
      filtered = filtered.filter(tip => tip.difficulty === currentFilters.difficulty);
    }
    if (currentFilters.category) {
      filtered = filtered.filter(tip => tip.category === currentFilters.category);
    }

    renderTips(filtered);
  }

  function updateActiveStates() {
    document.querySelectorAll('.filter-link').forEach(btn => {
      const filterType = btn.dataset.filter;
      const value = btn.dataset.value;

      if (currentFilters[filterType] === value) {
        btn.classList.add('active');
      } else if (value === '' && !currentFilters[filterType]) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  // Filter button clicks
  document.querySelectorAll('.filter-link').forEach(btn => {
    btn.addEventListener('click', () => {
      const filterType = btn.dataset.filter;
      const value = btn.dataset.value;

      currentFilters[filterType] = value;
      updateActiveStates();
      filterTips();
    });
  });

  // Clear filters button
  clearBtn?.addEventListener('click', () => {
    currentFilters = { act: '', difficulty: '', category: '' };
